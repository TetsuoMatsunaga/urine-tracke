<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>排尿記録</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #f9f8f5;
    min-height: 100vh;
    color: #3d3929;
  }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }
  #cupScreen {
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  #cupScreen.slide-down {
    transform: translateY(100vh);
    opacity: 0;
  }

  /* CUP SCREEN */
  #cupScreen {
    align-items: center; justify-content: center;
    padding: 30px 20px;
    background: #f9f8f5;
  }
  .cup-title { font-size: 18px; font-weight: 700; color: #3d3929; margin-bottom: 4px; }
  .cup-hint { font-size: 11px; color: #a09880; margin-bottom: 24px; text-align: center; line-height: 1.8; }

  /* ビーカー */
  .beaker-wrap {
    position: relative; width: 120px; height: 210px;
    cursor: pointer; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  .beaker-wrap svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2; pointer-events: none;
  }
  .beaker-inner {
    position: absolute;
    bottom: 8px; left: 8px;
    width: 104px; height: 186px;
    overflow: hidden;
    border-radius: 0 0 6px 6px;
    z-index: 1;
  }
  .water-body {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    background: linear-gradient(180deg, #7ab8e0, #4a90c8);
    transition: height 0.06s linear;
  }
  .water-top::after {
    content: '';
    position: absolute;
    top: -5px; left: -8px; right: -8px; height: 10px;
    background: radial-gradient(ellipse 60% 100% at 50% 100%, #a0d4f480 60%, transparent 100%);
    animation: wave 1.1s ease-in-out infinite;
  }
  @keyframes wave { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

  .volume-label {
    font-size: 34px; font-weight: 700; color: #3d3929;
    margin: 18px 0 6px; min-height: 42px; text-align: center;
  }
  .action-label {
    font-size: 13px; font-weight: 600; min-height: 22px;
    margin-bottom: 12px; color: #7aaac8; text-align: center;
  }
  .close-btn {
    margin-top: 18px;
    background: #f0ede6;
    border: 1px solid #d8d4c8;
    color: #3d3929;
    border-radius: 50px; padding: 12px 44px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .op-hint { font-size: 10px; color: #b8b0a0; margin-top: 14px; text-align: center; line-height: 1.8; }

  /* GRAPH SCREEN */
  #graphScreen { padding: 20px 16px 100px; background: #f9f8f5; }
  .app-title { text-align: center; font-size: 20px; font-weight: 700; color: #3d3929; margin-bottom: 4px; }
  .date-label { text-align: center; font-size: 12px; color: #a09880; margin-bottom: 20px; }

  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-box {
    flex: 1; background: #f0ede6;
    border-radius: 16px; padding: 14px 10px; text-align: center;
    border: 1px solid #e0dcd2;
  }
  .stat-num { font-size: 26px; font-weight: 700; color: #5a9ed0; }
  .stat-lbl { font-size: 11px; color: #a09880; margin-top: 2px; }

  .card {
    background: #f0ede6;
    border-radius: 20px; padding: 16px; margin-bottom: 16px;
    border: 1px solid #e0dcd2;
  }
  .card-title { font-size: 13px; font-weight: 600; color: #7a7060; margin-bottom: 10px; }
  .chart-wrap { position: relative; height: 160px; }

  .fab {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #f0ede6;
    color: #3d3929; border: 1px solid #d8d4c8;
    border-radius: 50px; padding: 16px 36px;
    font-size: 16px; font-weight: 700;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    cursor: pointer; letter-spacing: 1px; white-space: nowrap;
  }
</style>
</head>
<body>

<!-- CUP SCREEN -->
<div id="cupScreen" class="screen active">
  <div class="cup-title">💧 排尿を記録</div>
  <div class="cup-hint">
    タップ → 排尿あり記録<br>
    押しながら上ドラッグ → 量を調整して記録<br>
    素早く下スワイプ → 尿漏れあり記録
  </div>

  <div class="beaker-wrap" id="cupWrap">
    <div class="beaker-inner">
      <div class="water-body" id="waterBody"></div>
    </div>
    <svg viewBox="0 0 120 210" xmlns="http://www.w3.org/2000/svg">
      <rect x="7" y="14" width="106" height="190" rx="6" ry="6"
            fill="none" stroke="#c8c0b0" stroke-width="3"/>
      <path d="M85 14 L95 4 L105 14" fill="none" stroke="#c8c0b0" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="80" y1="190" x2="100" y2="190" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="194" text-anchor="end" font-size="9" fill="#a09880">50</text>
      <line x1="80" y1="163" x2="100" y2="163" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="167" text-anchor="end" font-size="9" fill="#a09880">100</text>
      <line x1="80" y1="136" x2="100" y2="136" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="140" text-anchor="end" font-size="9" fill="#a09880">150</text>
      <line x1="80" y1="109" x2="100" y2="109" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="113" text-anchor="end" font-size="9" fill="#a09880">200</text>
      <line x1="80" y1="82" x2="100" y2="82" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="86" text-anchor="end" font-size="9" fill="#a09880">250</text>
      <line x1="80" y1="55" x2="100" y2="55" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="59" text-anchor="end" font-size="9" fill="#a09880">300</text>
      <line x1="80" y1="28" x2="100" y2="28" stroke="#d8d4c8" stroke-width="1.5"/>
      <text x="78" y="32" text-anchor="end" font-size="9" fill="#a09880">350</text>
    </svg>
  </div>

  <div class="volume-label" id="volumeLabel">－</div>
  <div class="action-label" id="actionLabel"></div>
  <button class="close-btn" onclick="showGraph()">Close</button>
  <div class="op-hint">↑ 上ドラッグで水位UP　↓ 下ドラッグで水位DOWN<br>素早く下スワイプ → 尿漏れあり</div>
</div>

<!-- GRAPH SCREEN -->
<div id="graphScreen" class="screen">
  <div class="app-title">💧 排尿記録</div>
  <div class="date-label" id="dateLabel"></div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="todayCount">0</div><div class="stat-lbl">今日の回数</div></div>
    <div class="stat-box"><div class="stat-num" id="todayLeak">0</div><div class="stat-lbl">今日の尿漏れ</div></div>
    <div class="stat-box"><div class="stat-num" id="todayVol">-</div><div class="stat-lbl">今日の平均(ml)</div></div>
  </div>
  <div class="card">
    <div class="card-title">📈 量の記録（直近24時間）</div>
    <div class="chart-wrap"><canvas id="areaChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">📅 回数（過去7日）</div>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>
  <button class="fab" onclick="showCup()">＋ 記録する</button>
</div>

<script>
let records = [];
try { records = JSON.parse(localStorage.getItem('urineRecords') || '[]'); } catch(e){}
function saveRecords() { try { localStorage.setItem('urineRecords', JSON.stringify(records)); } catch(e){} }
function addRecord(ml, leak) { records.push({t:Date.now(), ml, leak}); saveRecords(); updateStats(); updateCharts(); }

function showGraph() {
  const cup = document.getElementById('cupScreen');
  cup.classList.add('slide-down');
  setTimeout(() => {
    cup.classList.remove('active','slide-down');
    document.getElementById('graphScreen').classList.add('active');
    updateStats(); updateCharts();
  }, 420);
}
function showCup() {
  resetCup();
  document.getElementById('graphScreen').classList.remove('active');
  document.getElementById('cupScreen').classList.add('active');
}
function resetCup() {
  currentMl=0; isDragging=false; isSwipe=false; hasMoved=false; direction=null;
  setWater(0);
  document.getElementById('volumeLabel').textContent='－';
  document.getElementById('actionLabel').textContent='';
}
function setWater(ml) {
  document.getElementById('waterBody').style.height = Math.min(100,(ml/350)*100)+'%';
}

let startY=0, lastY=0, startTime=0;
let currentMl=0, isDragging=false, isSwipe=false, hasMoved=false, direction=null;

function getY(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

function onStart(e) {
  e.preventDefault();
  startY=getY(e); lastY=startY; startTime=Date.now();
  isDragging=true; isSwipe=false; hasMoved=false; direction=null;
}
function onMove(e) {
  e.preventDefault();
  if (!isDragging||isSwipe) return;
  const y=getY(e), dy=y-startY;
  if (direction===null && Math.abs(dy)>10) direction = dy>0 ? 'down' : 'up';
  if (direction==='up') {
    hasMoved=true;
    const snapped=Math.max(0,Math.min(350,Math.round((-dy/186*350)/50)*50));
    currentMl=snapped; setWater(currentMl);
    document.getElementById('volumeLabel').textContent=currentMl>0?currentMl+' ml':'－';
  }
  lastY=y;
}
function onEnd(e) {
  e.preventDefault();
  if (isSwipe||!isDragging) return;
  isDragging=false;
  const dy=lastY-startY, elapsed=Date.now()-startTime;
  if (direction==='down' && dy>40 && elapsed<500 && !hasMoved) {
    document.getElementById('actionLabel').textContent='💧 尿漏れあり';
    addRecord(null,true); showGraph(); return;
  }
  if (!hasMoved) {
    addRecord(null,false);
    document.getElementById('actionLabel').textContent='✓ 記録しました';
    setTimeout(showGraph,800);
  } else {
    addRecord(currentMl>0?currentMl:null,false);
    document.getElementById('actionLabel').textContent=(currentMl>0?currentMl+' ml ':'')+'✓ 記録しました';
    setTimeout(showGraph,900);
  }
}

const cup=document.getElementById('cupWrap');
cup.addEventListener('touchstart',onStart,{passive:false});
cup.addEventListener('touchmove',onMove,{passive:false});
cup.addEventListener('touchend',onEnd,{passive:false});
cup.addEventListener('mousedown',onStart);
document.addEventListener('mousemove',e=>{if(isDragging)onMove(e);});
document.addEventListener('mouseup',e=>{if(isDragging)onEnd(e);});

function updateStats() {
  const now=new Date(), s=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const t=records.filter(r=>r.t>=s);
  document.getElementById('todayCount').textContent=t.length;
  document.getElementById('todayLeak').textContent=t.filter(r=>r.leak).length;
  const v=t.filter(r=>r.ml!=null);
  document.getElementById('todayVol').textContent=v.length?Math.round(v.reduce((s,r)=>s+r.ml,0)/v.length):'-';
  const d=new Date();
  document.getElementById('dateLabel').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

let areaChart, barChart;
function updateCharts() {
  const now=Date.now(), h24=now-86400000;
  // 24時間を1時間ごと、ラベルをタイムスタンプで管理
  const buckets=[];
  for(let i=23;i>=0;i--){
    const t=now-i*3600000;
    const d=new Date(t);
    buckets.push({label:(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+'時', from:t-3600000, to:t, total:0, count:0});
  }
  records.filter(r=>r.t>=h24&&r.ml!=null).forEach(r=>{
    const b=buckets.find(b=>r.t>=b.from&&r.t<b.to);
    if(b){b.total+=r.ml; b.count++;}
  });
  const aL=buckets.map(b=>b.label);
  const aD=buckets.map(b=>b.count>0?b.total:null);
  if(areaChart)areaChart.destroy();
  areaChart=new Chart(document.getElementById('areaChart').getContext('2d'),{
    type:'line',
    data:{labels:aL,datasets:[{data:aD,fill:true,backgroundColor:'rgba(90,158,208,0.10)',borderColor:'#5a9ed0',borderWidth:2,pointBackgroundColor:'#5a9ed0',tension:0.4,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:9},color:'#a09880',maxTicksLimit:8},grid:{color:'#e8e4da'}},
        y:{ticks:{font:{size:9},color:'#a09880'},beginAtZero:true,grid:{color:'#e8e4da'},title:{display:true,text:'ml',color:'#a09880',font:{size:10}}}
      }}
  });
  const days=[],counts=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const s=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();days.push((d.getMonth()+1)+'/'+d.getDate());counts.push(records.filter(r=>r.t>=s&&r.t<s+86400000).length);}
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{labels:days,datasets:[{data:counts,backgroundColor:'rgba(90,158,208,0.40)',borderColor:'#5a9ed0',borderWidth:1.5,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:10},color:'#a09880'},grid:{color:'#e8e4da'}},
        y:{ticks:{font:{size:9},color:'#a09880',stepSize:1},beginAtZero:true,grid:{color:'#e8e4da'},title:{display:true,text:'回',color:'#a09880',font:{size:10}}}
      }}
  });
}

updateStats();
</script>
</body>
</html>
